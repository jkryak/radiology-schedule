<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Rad/PA Daily Schedule</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    .glass-card {
      background: rgba(255, 255, 255, 0.9);
      backdrop-filter: blur(10px);
      border: 1px solid rgba(226, 232, 240, 1);
    }
  </style>
</head>
<body class="bg-slate-50 min-h-screen font-sans text-slate-900">
  <div class="max-w-lg mx-auto p-5">
 
    <header class="mb-6 text-center">
      <h1 class="text-2xl font-bold text-blue-900">Radiology Dashboard</h1>
 
      <!-- Date nav -->
      <div class="flex items-center justify-center gap-4 mt-2">
        <button id="prev-day" onclick="changeDay(-1)"
          class="w-9 h-9 rounded-full bg-white border border-slate-200 shadow-sm flex items-center justify-center text-slate-500 hover:bg-slate-100 active:scale-95 transition text-lg">‹</button>
        <div class="text-center">
          <p id="current-date" class="text-slate-700 font-semibold"></p>
          <p id="today-label" class="text-xs text-blue-500 font-medium h-4"></p>
        </div>
        <button id="next-day" onclick="changeDay(1)"
          class="w-9 h-9 rounded-full bg-white border border-slate-200 shadow-sm flex items-center justify-center text-slate-500 hover:bg-slate-100 active:scale-95 transition text-lg">›</button>
      </div>
    </header>
 
    <!-- Closed banner -->
    <div id="closed-banner" class="hidden mb-6 bg-blue-100 border border-blue-300 rounded-2xl p-6 text-center">
      <p class="text-2xl font-bold text-blue-800">🏖️ Holiday</p>
      <p class="text-blue-600 mt-1">No schedule today</p>
    </div>
 
    <!-- No data banner -->
    <div id="nodata-banner" class="hidden mb-6 bg-slate-100 border border-slate-200 rounded-2xl p-6 text-center">
      <p class="text-slate-500">No schedule data for this day.</p>
    </div>
 
    <!-- Main content -->
    <div id="main-content">
 
      <!-- Physician columns -->
      <div class="grid grid-cols-2 gap-3 mb-5">
        <div>
          <h2 class="text-xs font-semibold uppercase tracking-wider text-slate-400 mb-2 px-1">IR</h2>
          <div class="space-y-2">
            <div class="glass-card p-3 rounded-xl shadow-sm">
              <p class="text-xs text-blue-600 font-bold uppercase">Primary</p>
              <p id="ir-primary" class="text-base font-semibold text-slate-800">—</p>
            </div>
            <div class="glass-card p-3 rounded-xl shadow-sm">
              <p class="text-xs text-indigo-600 font-bold uppercase">Assist</p>
              <p id="ir-assist" class="text-base font-semibold text-slate-800">—</p>
            </div>
            <div class="glass-card p-3 rounded-xl shadow-sm">
              <p class="text-xs text-purple-600 font-bold uppercase">CT/IR</p>
              <p id="ir-ct" class="text-base font-semibold text-slate-800">—</p>
            </div>
          </div>
        </div>
        <div>
          <h2 class="text-xs font-semibold uppercase tracking-wider text-slate-400 mb-2 px-1">Coverage</h2>
          <div class="space-y-2">
            <div class="glass-card p-3 rounded-xl shadow-sm">
              <p class="text-xs text-emerald-600 font-bold uppercase">Upfront</p>
              <p id="upfront" class="text-base font-semibold text-slate-800">—</p>
            </div>
            <div class="glass-card p-3 rounded-xl shadow-sm">
              <p class="text-xs text-orange-600 font-bold uppercase">Peds</p>
              <p id="peds" class="text-base font-semibold text-slate-800">—</p>
            </div>
            <div class="glass-card p-3 rounded-xl shadow-sm">
              <p class="text-xs text-rose-600 font-bold uppercase">Neuro Proc</p>
              <p id="neuro-proc" class="text-base font-semibold text-slate-800">—</p>
            </div>
          </div>
        </div>
      </div>
 
      <!-- PA Section -->
      <div class="mb-5">
        <h2 class="text-xs font-semibold uppercase tracking-wider text-slate-400 mb-2 px-1">Physician Assistants</h2>
        <div id="pa-list" class="grid grid-cols-1 gap-2"></div>
      </div>
 
      <!-- US Flow Tech + Charge RN -->
      <div class="grid grid-cols-2 gap-3 mt-4">
        <div class="glass-card p-3 rounded-xl shadow-sm text-center">
          <p class="text-xs text-slate-400 uppercase font-semibold tracking-wider">US Flow Tech</p>
          <p id="us-flow-tech" class="text-sm font-semibold text-slate-700 mt-1">—</p>
        </div>
        <div class="glass-card p-3 rounded-xl shadow-sm text-center">
          <p class="text-xs text-slate-400 uppercase font-semibold tracking-wider">Charge RN</p>
          <p id="charge-rn" class="text-sm font-semibold text-slate-700 mt-1">—</p>
        </div>
      </div>
 
    </div>
 
    <footer class="mt-10 text-center text-xs text-slate-400">
      Source: Lightning Bolt Lite • Updated Monthly
    </footer>
  </div>
 
  <script>
    let scheduleData = {};
    let currentDate = new Date();
    // Normalize to midnight local time
    currentDate.setHours(0, 0, 0, 0);
    const today = new Date(currentDate);
 
    function formatKey(date) {
      const mm = String(date.getMonth() + 1).padStart(2, '0');
      const dd = String(date.getDate()).padStart(2, '0');
      return `${mm}/${dd}`;
    }
 
    function formatDisplay(date) {
      return date.toLocaleDateString('en-US', { weekday: 'long', month: 'long', day: 'numeric' });
    }
 
    function changeDay(delta) {
      currentDate.setDate(currentDate.getDate() + delta);
      renderDay();
    }
 
    function renderDay() {
      const key = formatKey(currentDate);
      const isToday = formatKey(currentDate) === formatKey(today);
 
      document.getElementById('current-date').innerText = formatDisplay(currentDate);
      document.getElementById('today-label').innerText = isToday ? 'Today' : '';
 
      // Hide all banners/content first
      document.getElementById('closed-banner').classList.add('hidden');
      document.getElementById('nodata-banner').classList.add('hidden');
      document.getElementById('main-content').classList.remove('hidden');
 
      const dayData = scheduleData[key];
 
      if (!dayData) {
        document.getElementById('main-content').classList.add('hidden');
        document.getElementById('nodata-banner').classList.remove('hidden');
        return;
      }
 
      if (dayData.closed) {
        document.getElementById('main-content').classList.add('hidden');
        document.getElementById('closed-banner').classList.remove('hidden');
        return;
      }
 
      document.getElementById('ir-primary').innerText   = dayData['IR Primary']   || '—';
      document.getElementById('ir-assist').innerText    = dayData['IR Assist']    || '—';
      document.getElementById('ir-ct').innerText        = dayData['IR/CT']        || '—';
      document.getElementById('upfront').innerText      = dayData['Upfront']      || '—';
      document.getElementById('peds').innerText         = dayData['Peds']         || '—';
      document.getElementById('neuro-proc').innerText   = dayData['Neuro Proc']   || '—';
      document.getElementById('us-flow-tech').innerText = dayData['US Flow Tech'] || '—';
      document.getElementById('charge-rn').innerText    = dayData['Charge RN']    || '—';
 
      const paContainer = document.getElementById('pa-list');
      paContainer.innerHTML = '';
      (dayData.PAs || []).forEach(pa => {
        paContainer.innerHTML += `
          <div class="glass-card p-3 rounded-xl flex justify-between items-center">
            <span class="text-sm font-medium text-slate-500">${pa.role}</span>
            <span class="text-sm font-semibold text-slate-800">${pa.name}</span>
          </div>`;
      });
    }
 
    fetch('data.json')
      .then(r => r.json())
      .then(data => {
        scheduleData = data.schedule || {};
        renderDay();
      })
      .catch(err => console.error('Error loading schedule:', err));
  </script>
</body>
</html>
